<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>LocalMails</title>
    <base href="/" />
    <link rel="stylesheet" href="_content/LocalMails.Shared/css/theme.css" />
    <link rel="stylesheet" href="_content/BlazorBlueprint.Components/blazorblueprint.css" />
    <link rel="stylesheet" href="_content/LocalMails.Shared/app.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="icon" href="data:,">
</head>

<body>
    <div id="app">Loading...</div>

    <script src="_framework/blazor.webview.js"></script>
    <script>
        setTimeout(function () {
            if (typeof Blazor === 'undefined') {
                document.getElementById('app').innerHTML = 'Loading...<br /><span style="color:red; font-size:small;">Error: Blazor framework not found. Check if _framework/blazor.webview.js is accessible.</span>';
            }
        }, 3000);
    </script>
    <script>
        window.onerror = function (msg, url, line) {
            var errorUi = document.getElementById('blazor-error-ui');
            if (errorUi) errorUi.style.display = 'block';
            console.error(msg, url, line);
        };
    </script>
</body>

</html>
